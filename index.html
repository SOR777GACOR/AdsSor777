<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOR77 - OFFICIAL GACOR</title>
    <style>
        /* Warna Brand SOR77 */
        :root {
            --gold: #ffaa00;
            --gold-bright: #ffea00;
            --dark: #000000;
            --neon: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--dark);
            font-family: 'Arial Black', Gadget, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Styling Banner */
        .banner {
            width: 100%;
            max-width: 500px; /* Ukuran pas buat mobile */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            margin-bottom: 25px;
            border: 2px solid #333;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .gold {
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 0 0 5px var(--neon);
        }

        /* Tombol Masuk */
        .btn-main {
            background: linear-gradient(45deg, var(--gold), var(--gold-bright));
            color: #000;
            padding: 22px 60px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.6rem;
            box-shadow: 0 0 25px var(--gold);
            text-transform: uppercase;
            transition: 0.3s;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--gold); }
            50% { transform: scale(1.07); box-shadow: 0 0 40px var(--gold-bright); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--gold); }
        }

        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="IMG_20260416_111050_313.jpg" alt="SOR77 Banner" class="banner">

        <div class="logo"><span class="gold">SOR</span>777</div>
        <p class="tagline">Situs Resmi Terpercaya & Gacor</p>
        
        <a href="https://sorkaleah.short.gy/sorkale" class="btn-main">MASUK SEKARANG</a>

        <div class="footer">
            &copy; 2026 SOR777 GACOR - VERIFIED OFFICIAL SITUS
        </div>
    </div>
</body>
</html>
